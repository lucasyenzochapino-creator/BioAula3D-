<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cuerpo Humano 3D</title>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#020617;color:#fff;font-family:system-ui,sans-serif;overflow:hidden;height:100vh;display:flex}
#wrap{flex:1;position:relative;min-width:0}#hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);color:#475569;font-size:11px;pointer-events:none;white-space:nowrap}
#panel{width:272px;min-width:272px;background:#0f172a;border-left:1px solid #1e293b;display:flex;flex-direction:column;overflow:hidden}
#ph{padding:16px;border-bottom:1px solid #1e293b}#ph h1{font-size:12px;font-weight:700;color:#f87171;letter-spacing:.08em;text-transform:uppercase}#ph p{font-size:11px;color:#64748b;margin-top:2px}
#pc{padding:16px;border-bottom:1px solid #1e293b;min-height:158px}#pc .icon{font-size:26px;margin-bottom:6px}#pc h2{font-size:15px;font-weight:700;color:#fff;margin-bottom:6px}#pc .d{font-size:12px;color:#94a3b8;line-height:1.6;margin-bottom:6px}#pc .f{font-size:12px;color:#cbd5e1;line-height:1.65}#pc ul{margin-top:8px;padding-left:4px}#pc li{font-size:11px;color:#64748b;list-style:none;margin-bottom:3px}#pc li::before{content:'› ';color:#475569}
#pc .x{margin-top:10px;font-size:11px;color:#64748b;background:none;border:none;cursor:pointer;padding:0}#pc .x:hover{color:#94a3b8}
#pl{overflow-y:auto;padding:8px;flex:1}.ob{width:100%;text-align:left;padding:8px 10px;border-radius:8px;border:1px solid #1e293b;background:transparent;color:#94a3b8;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:9px;margin-bottom:3px;transition:.15s}.ob:hover{background:#1e293b;color:#e2e8f0;border-color:#334155}.ob.sel{border-color:var(--c);color:#fff;background:rgba(255,255,255,0.04)}.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
@media(max-width:640px){#panel{display:none}}
</style></head>
<body>
<div id="wrap"><span id="hint">Clic en órganos para explorar sistemas</span></div>
<div id="panel">
  <div id="ph"><h1>🫀 Cuerpo Humano</h1><p>Sistemas anatómicos 3D</p></div>
  <div id="pc">
    <div id="wmsg"><p class="d">Clic en los órganos iluminados para explorar cada sistema.</p><p class="f" style="margin-top:6px">Los órganos pulsan en tiempo real.</p></div>
    <div id="det" style="display:none"><div id="dicon" class="icon"></div><h2 id="dn"></h2><p class="d" id="dd"></p><ul id="dparts"></ul><button class="x" onclick="clearSel()">✕ Cerrar</button></div>
  </div>
  <div id="pl"></div>
</div>
<script>
const SYSTEMS=[
  {id:'nervioso',name:'Sistema Nervioso',icon:'🧠',color:'#a855f7',d:'Coordina funciones del cuerpo mediante señales eléctricas.',parts:['Cerebro (encéfalo)','Médula espinal','Nervios periféricos','12 pares craneales']},
  {id:'circulatorio',name:'Sistema Circulatorio',icon:'🫀',color:'#ef4444',d:'Bombea sangre, oxígeno y nutrientes a todo el cuerpo.',parts:['Corazón (4 cámaras)','Arterias y venas','Capilares','~5L de sangre']},
  {id:'respiratorio',name:'Sistema Respiratorio',icon:'🫁',color:'#60a5fa',d:'Intercambio gaseoso: O₂ al interior, CO₂ al exterior.',parts:['Pulmones (300M alvéolos)','Tráquea y bronquios','Diafragma','~12-20 resp/min']},
  {id:'digestivo',name:'Sistema Digestivo',icon:'🍽',color:'#f59e0b',d:'Procesa alimentos y absorbe nutrientes esenciales.',parts:['Estómago (~1.5L)','Intestino delgado (6m)','Intestino grueso (1.5m)','Hígado e islotes']},
  {id:'oseo',name:'Sistema Óseo',icon:'🦴',color:'#cbd5e1',d:'Sostén, protección y producción de células sanguíneas.',parts:['206 huesos adulto','Columna (33 vértebras)','Médula ósea roja','Articulaciones sinoviales']}
];
let sel=null;
const pl=document.getElementById('pl');
SYSTEMS.forEach(s=>{const b=document.createElement('button');b.className='ob';b.id='btn-'+s.id;b.style.setProperty('--c',s.color);b.innerHTML=`<span class="dot" style="background:${s.color}"></span>${s.icon} ${s.name}`;b.onclick=()=>selectSys(s.id);pl.appendChild(b);});
function selectSys(id){sel=id;const s=SYSTEMS.find(x=>x.id===id);if(!s)return;document.getElementById('wmsg').style.display='none';document.getElementById('det').style.display='';document.getElementById('dicon').textContent=s.icon;document.getElementById('dn').textContent=s.name;document.getElementById('dd').textContent=s.d;const ul=document.getElementById('dparts');ul.innerHTML='';s.parts.forEach(p=>{const li=document.createElement('li');li.textContent=p;ul.appendChild(li);});document.querySelectorAll('.ob').forEach(b=>b.classList.remove('sel'));document.getElementById('btn-'+id)?.classList.add('sel');}
function clearSel(){sel=null;document.getElementById('det').style.display='none';document.getElementById('wmsg').style.display='';document.querySelectorAll('.ob').forEach(b=>b.classList.remove('sel'));}
const W=document.getElementById('wrap');
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(W.offsetWidth,W.offsetHeight);
renderer.outputEncoding=THREE.sRGBEncoding;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.0;
W.appendChild(renderer.domElement);
const scene=new THREE.Scene();scene.background=new THREE.Color(0x020617);
const camera=new THREE.PerspectiveCamera(48,W.offsetWidth/W.offsetHeight,0.1,100);
camera.position.set(0,0.5,9.5);
const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.06;controls.enablePan=false;controls.minDistance=4;controls.maxDistance=16;
scene.add(new THREE.AmbientLight(0xffffff,0.1));
const pl1=new THREE.PointLight(0xffffff,2.0,20);pl1.position.set(0,3,5);scene.add(pl1);
const pl2=new THREE.PointLight(0x60a5fa,0.8,14);pl2.position.set(-3,1,3);scene.add(pl2);
const pl3=new THREE.PointLight(0xf97316,0.6,12);pl3.position.set(3,-1,2);scene.add(pl3);
// Stars
const stG=new THREE.BufferGeometry(),stP=[];
for(let i=0;i<1400;i++){const r=25+Math.random()*35,p=Math.acos(2*Math.random()-1),t=2*Math.PI*Math.random();stP.push(r*Math.sin(p)*Math.cos(t),r*Math.sin(p)*Math.sin(t),r*Math.cos(p));}
stG.setAttribute('position',new THREE.BufferAttribute(new Float32Array(stP),3));
scene.add(new THREE.Points(stG,new THREE.PointsMaterial({color:0x334155,size:0.12,sizeAttenuation:true})));
const click=[];
const SC='#fde8d5',SE='#f97316';
const skinMat=()=>new THREE.MeshPhysicalMaterial({color:new THREE.Color(SC),transparent:true,opacity:0.72,roughness:0.5,transmission:0.28,thickness:0.9,emissive:new THREE.Color(SE),emissiveIntensity:0.06});
// Body segments
const bodySegs=[
  {geo:[0.58,48,48],type:'sphere',pos:[0,3.2,0]},
  {geo:[0.19,0.22,0.44,16],type:'cyl',pos:[0,2.56,0]},
  {geo:[0.72,48,48],type:'sphere',pos:[0,1.35,0],sc:[1.05,1.35,0.76]},
  {geo:[0.65,32,32],type:'sphere',pos:[0,0.08,0],sc:[0.9,0.7,0.76]},
  {geo:[0.48,24,24],type:'sphere',pos:[-0.82,2.12,0],sc:[0.55,0.55,0.55]},
  {geo:[0.48,24,24],type:'sphere',pos:[0.82,2.12,0],sc:[0.55,0.55,0.55]},
  {geo:[0.16,0.72,8,12],type:'cap',pos:[-1.12,1.62,0]},
  {geo:[0.16,0.72,8,12],type:'cap',pos:[1.12,1.62,0]},
  {geo:[0.13,0.6,8,12],type:'cap',pos:[-1.14,0.68,0]},
  {geo:[0.13,0.6,8,12],type:'cap',pos:[1.14,0.68,0]},
  {geo:[0.23,0.85,8,12],type:'cap',pos:[-0.44,-0.95,0]},
  {geo:[0.23,0.85,8,12],type:'cap',pos:[0.44,-0.95,0]},
  {geo:[0.18,0.8,8,12],type:'cap',pos:[-0.44,-2.1,0]},
  {geo:[0.18,0.8,8,12],type:'cap',pos:[0.44,-2.1,0]},
];
bodySegs.forEach(s=>{
  let geo;
  if(s.type==='sphere')geo=new THREE.SphereGeometry(...s.geo);
  else if(s.type==='cyl')geo=new THREE.CylinderGeometry(...s.geo);
  else geo=new THREE.CylinderGeometry(s.geo[0],s.geo[0],s.geo[1],s.geo[2]);
  const m=new THREE.Mesh(geo,skinMat());
  m.position.set(...s.pos);
  if(s.sc)m.scale.set(...s.sc);
  scene.add(m);
});
// Clickable organs
function makeOrgan(geo,pos,color,systemId){
  const m=new THREE.Mesh(geo,new THREE.MeshPhysicalMaterial({color:new THREE.Color(color),emissive:new THREE.Color(color),emissiveIntensity:1.5,roughness:0.22,metalness:0.08}));
  m.position.set(...pos);m.userData.id=systemId;m.userData.baseEI=1.5;scene.add(m);click.push(m);return m;
}
// Brain
const brain=makeOrgan(new THREE.SphereGeometry(0.44,32,32),[0,3.28,0.04],'#e879f9','nervioso');
// Heart (2 overlapping spheres)
const heartG=new THREE.Group();
[[-0.14,1.38,0.32],[0.04,1.38,0.32]].forEach((p,i)=>{
  const m=new THREE.Mesh(new THREE.SphereGeometry(i?0.17:0.2,20,20),new THREE.MeshPhysicalMaterial({color:new THREE.Color('#dc2626'),emissive:new THREE.Color('#ff0000'),emissiveIntensity:1.5,roughness:0.18,metalness:0.12}));
  m.position.set(...p);m.userData.id='circulatorio';m.userData.baseEI=1.5;heartG.add(m);click.push(m);
});
scene.add(heartG);
// Lungs
const lungsG=new THREE.Group();
[[-0.42,1.52,0.12],[0.42,1.52,0.12]].forEach(p=>{
  const m=new THREE.Mesh(new THREE.SphereGeometry(0.22,16,16),new THREE.MeshPhysicalMaterial({color:new THREE.Color('#93c5fd'),emissive:new THREE.Color('#60a5fa'),emissiveIntensity:1.0,roughness:0.3,transparent:true,opacity:0.92}));
  m.scale.set(1,1.4,0.8);m.position.set(...p);m.userData.id='respiratorio';m.userData.baseEI=1.0;lungsG.add(m);click.push(m);
});
scene.add(lungsG);
// Digestive
const digMat=new THREE.MeshPhysicalMaterial({color:new THREE.Color('#fbbf24'),emissive:new THREE.Color('#f59e0b'),emissiveIntensity:0.9,roughness:0.4});
const stom=new THREE.Mesh(new THREE.SphereGeometry(0.24,16,16),digMat.clone());
stom.scale.set(1.2,0.85,0.85);stom.position.set(-0.22,0.62,0.3);stom.userData.id='digestivo';stom.userData.baseEI=0.9;scene.add(stom);click.push(stom);
const liver=new THREE.Mesh(new THREE.SphereGeometry(0.2,16,16),new THREE.MeshPhysicalMaterial({color:new THREE.Color('#b45309'),emissive:new THREE.Color('#92400e'),emissiveIntensity:0.8}));
liver.scale.set(1.3,0.62,0.7);liver.position.set(0.3,0.72,0.2);liver.userData.id='digestivo';liver.userData.baseEI=0.8;scene.add(liver);click.push(liver);
// Skeleton: spine + ribs
const boneColor='#e2e8f0',boneEmi='#94a3b8';
for(let i=0;i<16;i++){const v=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.08,0.22,8),new THREE.MeshPhysicalMaterial({color:new THREE.Color(boneColor),emissive:new THREE.Color(boneEmi),emissiveIntensity:0.3,roughness:0.28,metalness:0.12}));v.position.set(0,-2.05+i*0.38,-0.24);v.userData.id='oseo';v.userData.baseEI=0.3;scene.add(v);click.push(v);}
for(let i=0;i<12;i++){const y=0.55+i*0.13,sx=0.9-i*0.032;const rib=new THREE.Mesh(new THREE.TorusGeometry(0.62,0.028,6,24,Math.PI),new THREE.MeshPhysicalMaterial({color:new THREE.Color(boneColor),emissive:new THREE.Color(boneEmi),emissiveIntensity:0.3,roughness:0.28,metalness:0.12}));rib.position.set(0,y,0);rib.scale.set(sx,1,0.48);rib.userData.id='oseo';rib.userData.baseEI=0.3;scene.add(rib);click.push(rib);}
const composer=new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));
const bloom=new THREE.UnrealBloomPass(new THREE.Vector2(W.offsetWidth,W.offsetHeight),1.4,0.35,0.1);
composer.addPass(bloom);
const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
renderer.domElement.addEventListener('click',e=>{
  const rc=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rc.left)/rc.width)*2-1;mouse.y=-((e.clientY-rc.top)/rc.height)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(click);
  if(hits.length){let o=hits[0].object;while(o&&!o.userData.id)o=o.parent;if(o&&o.userData.id)selectSys(o.userData.id);}
});
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  controls.update();
  // Heart beat ~80bpm
  const hs=1+Math.sin(t*5.5)*0.14;heartG.scale.setScalar(hs);
  // Lungs breathe
  const ls=1+Math.sin(t*1.55)*0.07;lungsG.scale.set(ls,ls*0.93,ls);
  // Brain neural pulse
  brain.material.emissiveIntensity=brain.userData.id===sel?3.5:0.5+Math.sin(t*1.1)*.2;
  // Other organ highlights
  click.forEach(o=>{
    if(!o.material||o===brain)return;
    const base=o.userData.baseEI||0.8;
    o.material.emissiveIntensity=o.userData.id===sel?base*2.8+Math.sin(t*3)*.5:base;
  });
  composer.render();
}
window.addEventListener('resize',()=>{camera.aspect=W.offsetWidth/W.offsetHeight;camera.updateProjectionMatrix();renderer.setSize(W.offsetWidth,W.offsetHeight);composer.setSize(W.offsetWidth,W.offsetHeight);});
animate();
</script></body></html>
