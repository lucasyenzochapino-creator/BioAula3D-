<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neurona 3D</title>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#020617;color:#fff;font-family:system-ui,sans-serif;overflow:hidden;height:100vh;display:flex}
#wrap{flex:1;position:relative;min-width:0}#hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);color:#475569;font-size:11px;pointer-events:none;white-space:nowrap}
#panel{width:272px;min-width:272px;background:#0f172a;border-left:1px solid #1e293b;display:flex;flex-direction:column;overflow:hidden}
#ph{padding:16px;border-bottom:1px solid #1e293b}#ph h1{font-size:12px;font-weight:700;color:#a855f7;letter-spacing:.08em;text-transform:uppercase}#ph p{font-size:11px;color:#64748b;margin-top:2px}
#pc{padding:16px;border-bottom:1px solid #1e293b;min-height:148px}#pc h2{font-size:15px;font-weight:700;color:#fff;margin-bottom:6px}#pc .d{font-size:12px;color:#94a3b8;line-height:1.6;margin-bottom:6px}#pc .f{font-size:12px;color:#cbd5e1;line-height:1.65}
#pc .x{margin-top:10px;font-size:11px;color:#64748b;background:none;border:none;cursor:pointer;padding:0}#pc .x:hover{color:#94a3b8}
#pl{overflow-y:auto;padding:8px;flex:1}.ob{width:100%;text-align:left;padding:8px 10px;border-radius:8px;border:1px solid #1e293b;background:transparent;color:#94a3b8;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:9px;margin-bottom:3px;transition:.15s}.ob:hover{background:#1e293b;color:#e2e8f0;border-color:#334155}.ob.sel{background:#2e1065;border-color:#a855f7;color:#fff}.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
@media(max-width:640px){#panel{display:none}}
</style></head>
<body>
<div id="wrap"><span id="hint">Observá el impulso · Arrastrá · Clic en partes</span></div>
<div id="panel">
  <div id="ph"><h1>⚡ Neurona 3D</h1><p>Sistema nervioso</p></div>
  <div id="pc">
    <div id="wmsg"><p class="d">Observá el impulso eléctrico viajando por el axón.</p><p class="f" style="margin-top:6px">Clic en cualquier parte para explorar.</p></div>
    <div id="det" style="display:none"><h2 id="dn"></h2><p class="d" id="dd"></p><p class="f" id="df"></p><button class="x" onclick="clearSel()">✕ Cerrar</button></div>
  </div>
  <div id="pl"></div>
</div>
<script>
const DATA=[
  {id:'soma',name:'Soma (Cuerpo Celular)',color:'#a855f7',d:'Centro metabólico de la neurona.',f:'Contiene el núcleo y orgánulos. Integra señales entrantes y genera la respuesta.'},
  {id:'nucleo',name:'Núcleo Neuronal',color:'#3b82f6',d:'Centro de control genético.',f:'ADN y ARNm que dirigen la síntesis de proteínas neuronales específicas.'},
  {id:'dendrita',name:'Dendrita',color:'#f59e0b',d:'Prolongaciones receptoras.',f:'Reciben señales de otras neuronas. Mayor superficie = mayor integración sináptica.'},
  {id:'axon',name:'Axón',color:'#22c55e',d:'Prolongación transmisora única.',f:'Conduce el potencial de acción desde el soma hasta la terminal. Puede medir hasta 1 metro.'},
  {id:'mielina',name:'Vaina de Mielina',color:'#e2e8f0',d:'Aislante lipídico del axón.',f:'Acelera la conducción saltatoria. Producida por células de Schwann. 70% lípidos.'},
  {id:'terminal',name:'Botón Terminal',color:'#ef4444',d:'Zona de liberación sináptica.',f:'Libera neurotransmisores a la hendidura sináptica. Contiene vesículas sinápticas.'}
];
let sel=null;
const pl=document.getElementById('pl');
DATA.forEach(d=>{const b=document.createElement('button');b.className='ob';b.id='btn-'+d.id;b.innerHTML=`<span class="dot" style="background:${d.color}"></span>${d.name}`;b.onclick=()=>selectPart(d.id);pl.appendChild(b);});
function selectPart(id){sel=id;const d=DATA.find(x=>x.id===id);if(!d)return;document.getElementById('wmsg').style.display='none';document.getElementById('det').style.display='';document.getElementById('dn').textContent=d.name;document.getElementById('dd').textContent=d.d;document.getElementById('df').textContent=d.f;document.querySelectorAll('.ob').forEach(b=>b.classList.remove('sel'));document.getElementById('btn-'+id)?.classList.add('sel');}
function clearSel(){sel=null;document.getElementById('det').style.display='none';document.getElementById('wmsg').style.display='';document.querySelectorAll('.ob').forEach(b=>b.classList.remove('sel'));}
const W=document.getElementById('wrap');
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(W.offsetWidth,W.offsetHeight);
renderer.outputEncoding=THREE.sRGBEncoding;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=0.9;
W.appendChild(renderer.domElement);
const scene=new THREE.Scene();scene.background=new THREE.Color(0x020617);
const camera=new THREE.PerspectiveCamera(50,W.offsetWidth/W.offsetHeight,0.1,150);
camera.position.set(0,0,15);
const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.06;controls.enablePan=false;controls.minDistance=6;controls.maxDistance=24;
scene.add(new THREE.AmbientLight(0xffffff,0.07));
const pl1=new THREE.PointLight(0xa855f7,1.6,25);pl1.position.set(3,3,4);scene.add(pl1);
const pl2=new THREE.PointLight(0x22c55e,0.9,20);pl2.position.set(-2,-3,3);scene.add(pl2);
// Stars
const stG=new THREE.BufferGeometry(),stP=[];
for(let i=0;i<1600;i++){const r=40+Math.random()*60,p=Math.acos(2*Math.random()-1),t=2*Math.PI*Math.random();stP.push(r*Math.sin(p)*Math.cos(t),r*Math.sin(p)*Math.sin(t),r*Math.cos(p));}
stG.setAttribute('position',new THREE.BufferAttribute(new Float32Array(stP),3));
scene.add(new THREE.Points(stG,new THREE.PointsMaterial({color:0x334155,size:0.15,sizeAttenuation:true})));
const click=[];
// Soma
const soma=new THREE.Mesh(new THREE.SphereGeometry(0.88,48,48),new THREE.MeshPhysicalMaterial({color:0xa855f7,emissive:new THREE.Color(0xa855f7),emissiveIntensity:0.9,roughness:0.18}));
soma.userData.id='soma';scene.add(soma);click.push(soma);
// Nucleus inside soma
const nuc=new THREE.Mesh(new THREE.SphereGeometry(0.4,32,32),new THREE.MeshPhysicalMaterial({color:0x3b82f6,emissive:new THREE.Color(0x3b82f6),emissiveIntensity:1.0,transparent:true,opacity:0.85,roughness:0.08}));
nuc.userData.id='nucleo';scene.add(nuc);click.push(nuc);
// Dendrites
const dendPaths=[
  [new THREE.Vector3(0,0,0),new THREE.Vector3(1.2,1.4,0.3),new THREE.Vector3(1.9,2.3,0.5),new THREE.Vector3(1.6,3.1,0.2)],
  [new THREE.Vector3(0,0,0),new THREE.Vector3(-1.3,1.2,0.2),new THREE.Vector3(-2.1,2.1,0.4),new THREE.Vector3(-1.8,3.0,0.1)],
  [new THREE.Vector3(0,0,0),new THREE.Vector3(0.5,1.5,-0.8),new THREE.Vector3(0.2,2.5,-1.2)],
  [new THREE.Vector3(0,0,0),new THREE.Vector3(-0.8,1.3,-0.6),new THREE.Vector3(-1.3,2.2,-0.9)],
  [new THREE.Vector3(0,0,0),new THREE.Vector3(1.0,1.0,0.9),new THREE.Vector3(1.7,1.9,1.4)],
];
dendPaths.forEach(pts=>{
  const m=new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),30,0.07,8,false),new THREE.MeshPhysicalMaterial({color:0xf59e0b,emissive:new THREE.Color(0xf59e0b),emissiveIntensity:0.9,roughness:0.2}));
  m.userData.id='dendrita';scene.add(m);click.push(m);
});
// Axon
const axonPts=[new THREE.Vector3(0,0,0),new THREE.Vector3(0.1,-1.5,0),new THREE.Vector3(-0.1,-3.0,0),new THREE.Vector3(0,-4.6,0),new THREE.Vector3(0,-5.8,0)];
const axonCurve=new THREE.CatmullRomCurve3(axonPts);
const axon=new THREE.Mesh(new THREE.TubeGeometry(axonCurve,60,0.1,8,false),new THREE.MeshPhysicalMaterial({color:0x22c55e,emissive:new THREE.Color(0x22c55e),emissiveIntensity:0.85,roughness:0.18}));
axon.userData.id='axon';scene.add(axon);click.push(axon);
// Myelin sheaths
[-1.2,-2.2,-3.2,-4.2].forEach(y=>{
  const sh=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.22,0.72,16),new THREE.MeshPhysicalMaterial({color:0xe2e8f0,emissive:new THREE.Color(0xe2e8f0),emissiveIntensity:0.5,transparent:true,opacity:0.78,roughness:0.06}));
  sh.position.set(0,y,0);sh.userData.id='mielina';scene.add(sh);click.push(sh);
});
// Terminal
const term=new THREE.Mesh(new THREE.SphereGeometry(0.38,24,24),new THREE.MeshPhysicalMaterial({color:0xef4444,emissive:new THREE.Color(0xef4444),emissiveIntensity:2.0,roughness:0.12}));
term.position.set(0,-5.8,0);term.userData.id='terminal';scene.add(term);click.push(term);
// Synaptic pulses (2 - one on axon, one on dendrite)
const pulseA=new THREE.Mesh(new THREE.SphereGeometry(0.12,12,12),new THREE.MeshPhysicalMaterial({color:0x22c55e,emissive:new THREE.Color(0x22c55e),emissiveIntensity:4.0,roughness:0.04}));
scene.add(pulseA);
const pulseD=new THREE.Mesh(new THREE.SphereGeometry(0.09,10,10),new THREE.MeshPhysicalMaterial({color:0xf59e0b,emissive:new THREE.Color(0xf59e0b),emissiveIntensity:3.5,roughness:0.04}));
scene.add(pulseD);
const dendCurve=new THREE.CatmullRomCurve3(dendPaths[0]);
// Bloom
const composer=new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));
const bloom=new THREE.UnrealBloomPass(new THREE.Vector2(W.offsetWidth,W.offsetHeight),2.0,0.45,0.08);
composer.addPass(bloom);
// Raycaster
const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
renderer.domElement.addEventListener('click',e=>{
  const rc=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rc.left)/rc.width)*2-1;mouse.y=-((e.clientY-rc.top)/rc.height)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(click);
  if(hits.length){let o=hits[0].object;while(o&&!o.userData.id)o=o.parent;if(o&&o.userData.id)selectPart(o.userData.id);}
});
click.forEach(o=>{if(o.material)o.userData.baseEI=o.material.emissiveIntensity;});
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  controls.update();
  // Axon pulse
  const ta=(t*0.38)%1;
  const pa=axonCurve.getPoint(ta);
  pulseA.position.copy(pa);
  pulseA.material.emissiveIntensity=4.0+Math.sin(t*28)*0.8;
  // Dendrite pulse
  const td=((t*0.5)+0.5)%1;
  const pd=dendCurve.getPoint(td);
  pulseD.position.copy(pd);
  pulseD.material.emissiveIntensity=3.5+Math.sin(t*32)*0.7;
  // Soma pulse
  soma.scale.setScalar(1+Math.sin(t*1.2)*0.03);
  click.forEach(o=>{
    if(!o.material)return;
    const base=o.userData.baseEI||0.8;
    o.material.emissiveIntensity=o.userData.id===sel?base*2.8+Math.sin(t*3)*.5:base;
  });
  composer.render();
}
window.addEventListener('resize',()=>{camera.aspect=W.offsetWidth/W.offsetHeight;camera.updateProjectionMatrix();renderer.setSize(W.offsetWidth,W.offsetHeight);composer.setSize(W.offsetWidth,W.offsetHeight);});
animate();
</script></body></html>
