<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 380">
  <rect width="1280" height="380" fill="#0b1120"/>

  <!-- Title -->
  <text x="640" y="28" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="18" font-weight="bold" text-anchor="middle">La Marcha del Progreso — Evolución Humana</text>

  <!-- Timeline line -->
  <line x1="80" y1="330" x2="1210" y2="330" stroke="#f59e0b" stroke-width="1.5" opacity="0.35"/>
  <polygon points="1205,325 1218,330 1205,335" fill="#f59e0b" opacity="0.35"/>
  <text x="640" y="365" fill="#64748b" font-family="system-ui,Arial,sans-serif" font-size="12" text-anchor="middle">Hace millones de años (Ma) → Actualidad</text>

  <!-- === FIGURE 1: Sahelanthropus ~7 Ma — very hunched, small === -->
  <g fill="#f59e0b" opacity="0.9" transform="translate(110,255) rotate(28) scale(0.46)">
    <ellipse cx="0" cy="-118" rx="13" ry="15"/>
    <rect x="-7" y="-103" width="14" height="12" rx="3"/>
    <rect x="-15" y="-91" width="30" height="43" rx="7"/>
    <rect x="-16" y="-48" width="32" height="22" rx="5"/>
    <rect x="-22" y="-86" width="9" height="36" rx="4" transform="rotate(-38,-17,-86)"/>
    <rect x="13" y="-86" width="9" height="36" rx="4" transform="rotate(38,17,-86)"/>
    <rect x="-12" y="-26" width="11" height="26" rx="5" transform="rotate(-6,-6,-26)"/>
    <rect x="1" y="-26" width="11" height="26" rx="5" transform="rotate(6,6,-26)"/>
  </g>
  <text x="110" y="270" fill="#e2e8f0" font-family="system-ui,Arial,sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Sahelanthropus</text>
  <text x="110" y="284" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="11" text-anchor="middle">~7 Ma</text>
  <text x="110" y="297" fill="#64748b" font-family="system-ui,Arial,sans-serif" font-size="10" text-anchor="middle">~350 cc</text>

  <!-- === FIGURE 2: Australopithecus afarensis ~3.2 Ma — hunched === -->
  <g fill="#f59e0b" opacity="0.9" transform="translate(310,253) rotate(20) scale(0.56)">
    <ellipse cx="0" cy="-118" rx="13" ry="15"/>
    <rect x="-7" y="-103" width="14" height="12" rx="3"/>
    <rect x="-15" y="-91" width="30" height="43" rx="7"/>
    <rect x="-16" y="-48" width="32" height="22" rx="5"/>
    <rect x="-22" y="-86" width="9" height="33" rx="4" transform="rotate(-28,-17,-86)"/>
    <rect x="13" y="-86" width="9" height="33" rx="4" transform="rotate(28,17,-86)"/>
    <rect x="-12" y="-26" width="11" height="26" rx="5" transform="rotate(-4,-6,-26)"/>
    <rect x="1" y="-26" width="11" height="26" rx="5" transform="rotate(4,6,-26)"/>
  </g>
  <text x="310" y="267" fill="#e2e8f0" font-family="system-ui,Arial,sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Australopithecus</text>
  <text x="310" y="280" fill="#cbd5e1" font-family="system-ui,Arial,sans-serif" font-size="11" text-anchor="middle" opacity="0.75">(Lucy)</text>
  <text x="310" y="293" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="11" text-anchor="middle">~3.2 Ma</text>
  <text x="310" y="306" fill="#64748b" font-family="system-ui,Arial,sans-serif" font-size="10" text-anchor="middle">~450 cc</text>

  <!-- === FIGURE 3: Homo habilis ~2.5 Ma — slightly stooped === -->
  <g fill="#f59e0b" opacity="0.9" transform="translate(510,250) rotate(12) scale(0.66)">
    <ellipse cx="0" cy="-118" rx="14" ry="16"/>
    <rect x="-7" y="-102" width="14" height="12" rx="3"/>
    <rect x="-15" y="-90" width="30" height="42" rx="7"/>
    <rect x="-16" y="-48" width="32" height="22" rx="5"/>
    <rect x="-23" y="-85" width="10" height="30" rx="4" transform="rotate(-18,-18,-85)"/>
    <rect x="13" y="-85" width="10" height="30" rx="4" transform="rotate(18,18,-85)"/>
    <rect x="-12" y="-26" width="11" height="26" rx="5" transform="rotate(-4,-6,-26)"/>
    <rect x="1" y="-26" width="11" height="26" rx="5" transform="rotate(4,6,-26)"/>
  </g>
  <text x="510" y="264" fill="#e2e8f0" font-family="system-ui,Arial,sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Homo habilis</text>
  <text x="510" y="278" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="11" text-anchor="middle">~2.5 Ma</text>
  <text x="510" y="291" fill="#64748b" font-family="system-ui,Arial,sans-serif" font-size="10" text-anchor="middle">~600 cc</text>

  <!-- === FIGURE 4: Homo erectus ~1.8 Ma — nearly upright, taller === -->
  <g fill="#f59e0b" opacity="0.9" transform="translate(710,248) rotate(5) scale(0.82)">
    <ellipse cx="0" cy="-118" rx="14" ry="16"/>
    <rect x="-7" y="-102" width="14" height="12" rx="3"/>
    <rect x="-16" y="-90" width="32" height="42" rx="7"/>
    <rect x="-17" y="-48" width="34" height="22" rx="5"/>
    <rect x="-25" y="-84" width="10" height="29" rx="4" transform="rotate(-10,-20,-84)"/>
    <rect x="15" y="-84" width="10" height="29" rx="4" transform="rotate(10,20,-84)"/>
    <rect x="-13" y="-26" width="12" height="26" rx="5" transform="rotate(-4,-7,-26)"/>
    <rect x="1" y="-26" width="12" height="26" rx="5" transform="rotate(4,7,-26)"/>
  </g>
  <text x="710" y="262" fill="#e2e8f0" font-family="system-ui,Arial,sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Homo erectus</text>
  <text x="710" y="276" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="11" text-anchor="middle">~1.8 Ma</text>
  <text x="710" y="289" fill="#64748b" font-family="system-ui,Arial,sans-serif" font-size="10" text-anchor="middle">~1000 cc</text>

  <!-- === FIGURE 5: Homo neanderthalensis ~400 Ka — upright, stocky === -->
  <g fill="#f59e0b" opacity="0.9" transform="translate(910,246) rotate(2) scale(0.84)">
    <ellipse cx="0" cy="-118" rx="16" ry="18"/>
    <rect x="-8" y="-100" width="16" height="13" rx="3"/>
    <rect x="-18" y="-87" width="36" height="41" rx="7"/>
    <rect x="-19" y="-46" width="38" height="24" rx="5"/>
    <rect x="-27" y="-82" width="11" height="28" rx="5" transform="rotate(-8,-21,-82)"/>
    <rect x="16" y="-82" width="11" height="28" rx="5" transform="rotate(8,21,-82)"/>
    <rect x="-14" y="-22" width="13" height="22" rx="5" transform="rotate(-4,-7,-22)"/>
    <rect x="1" y="-22" width="13" height="22" rx="5" transform="rotate(4,7,-22)"/>
  </g>
  <text x="910" y="259" fill="#e2e8f0" font-family="system-ui,Arial,sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Neandertal</text>
  <text x="910" y="273" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="11" text-anchor="middle">~400 Ka</text>
  <text x="910" y="286" fill="#64748b" font-family="system-ui,Arial,sans-serif" font-size="10" text-anchor="middle">~1600 cc</text>

  <!-- === FIGURE 6: Homo sapiens ~300 Ka - hoy — fully upright, gracile === -->
  <g fill="#f59e0b" opacity="0.9" transform="translate(1110,244) rotate(0) scale(0.90)">
    <ellipse cx="0" cy="-118" rx="14" ry="17"/>
    <rect x="-7" y="-101" width="14" height="12" rx="3"/>
    <rect x="-16" y="-89" width="32" height="41" rx="7"/>
    <rect x="-17" y="-48" width="34" height="22" rx="5"/>
    <rect x="-25" y="-83" width="10" height="28" rx="4" transform="rotate(-8,-20,-83)"/>
    <rect x="15" y="-83" width="10" height="28" rx="4" transform="rotate(8,20,-83)"/>
    <rect x="-13" y="-26" width="11" height="26" rx="5" transform="rotate(-4,-7,-26)"/>
    <rect x="2" y="-26" width="11" height="26" rx="5" transform="rotate(4,7,-26)"/>
  </g>
  <text x="1110" y="258" fill="#e2e8f0" font-family="system-ui,Arial,sans-serif" font-size="13" text-anchor="middle" font-weight="bold">Homo sapiens</text>
  <text x="1110" y="272" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="11" text-anchor="middle">~300 Ka – hoy</text>
  <text x="1110" y="285" fill="#64748b" font-family="system-ui,Arial,sans-serif" font-size="10" text-anchor="middle">~1350 cc</text>

  <!-- Separation dots -->
  <circle cx="210" cy="253" r="3" fill="#f59e0b" opacity="0.25"/>
  <circle cx="410" cy="251" r="3" fill="#f59e0b" opacity="0.25"/>
  <circle cx="610" cy="249" r="3" fill="#f59e0b" opacity="0.25"/>
  <circle cx="810" cy="247" r="3" fill="#f59e0b" opacity="0.25"/>
  <circle cx="1010" cy="245" r="3" fill="#f59e0b" opacity="0.25"/>
</svg>
