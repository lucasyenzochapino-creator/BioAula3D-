<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440">
  <rect width="640" height="440" fill="#0b1120"/>

  <!-- Title -->
  <text x="320" y="28" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Evolución Humana</text>
  <text x="320" y="46" fill="#64748b" font-family="system-ui,Arial,sans-serif" font-size="11" text-anchor="middle">7 millones de años · de Sahelanthropus a Homo sapiens</text>

  <!-- Floor subtle line -->
  <line x1="20" y1="290" x2="620" y2="290" stroke="#1e293b" stroke-width="1"/>

  <!-- === FIGURE 1: Sahelanthropus ~7 Ma — very hunched, small ===
       transform: translate to floor point, rotate forward 27°, scale small -->
  <g fill="#f59e0b" opacity="0.93" transform="translate(53,290) rotate(27) scale(0.44)">
    <!-- Head (small brain case) -->
    <circle cx="0" cy="-90" r="14"/>
    <!-- Neck -->
    <rect x="-5" y="-76" width="10" height="10" rx="3"/>
    <!-- Body (torso+hips+legs as single smooth shape) -->
    <path d="M -18,-66 Q -22,-50 -16,-36 Q -14,-22 -14,-10 Q -12,-3 -6,0 L 6,0 Q 12,-3 14,-10 Q 14,-22 16,-36 Q 22,-50 18,-66 Q 10,-75 0,-75 Q -10,-75 -18,-66 Z"/>
    <!-- Arms hanging very forward (hunched) -->
    <ellipse cx="-22" cy="-50" rx="6" ry="21" transform="rotate(-38,-22,-50)"/>
    <ellipse cx="22" cy="-50" rx="6" ry="21" transform="rotate(38,22,-50)"/>
  </g>
  <text x="53" y="304" fill="#e2e8f0" font-family="system-ui,Arial,sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Sahelanthropus</text>
  <text x="53" y="316" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="9.5" text-anchor="middle">~7 Ma</text>
  <text x="53" y="327" fill="#475569" font-family="system-ui,Arial,sans-serif" font-size="9" text-anchor="middle">~350 cc</text>

  <!-- === FIGURE 2: Australopithecus afarensis ~3.2 Ma — hunched === -->
  <g fill="#f59e0b" opacity="0.93" transform="translate(160,288) rotate(19) scale(0.52)">
    <circle cx="0" cy="-90" r="14"/>
    <rect x="-5" y="-76" width="10" height="10" rx="3"/>
    <path d="M -18,-66 Q -22,-50 -16,-36 Q -14,-22 -14,-10 Q -12,-3 -6,0 L 6,0 Q 12,-3 14,-10 Q 14,-22 16,-36 Q 22,-50 18,-66 Q 10,-75 0,-75 Q -10,-75 -18,-66 Z"/>
    <ellipse cx="-22" cy="-50" rx="6" ry="20" transform="rotate(-28,-22,-50)"/>
    <ellipse cx="22" cy="-50" rx="6" ry="20" transform="rotate(28,22,-50)"/>
  </g>
  <text x="160" y="302" fill="#e2e8f0" font-family="system-ui,Arial,sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Australopithecus</text>
  <text x="160" y="313" fill="#94a3b8" font-family="system-ui,Arial,sans-serif" font-size="9" text-anchor="middle">(Lucy)</text>
  <text x="160" y="324" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="9.5" text-anchor="middle">~3.2 Ma</text>
  <text x="160" y="335" fill="#475569" font-family="system-ui,Arial,sans-serif" font-size="9" text-anchor="middle">~450 cc</text>

  <!-- === FIGURE 3: Homo habilis ~2.5 Ma — slightly stooped === -->
  <g fill="#f59e0b" opacity="0.93" transform="translate(267,285) rotate(11) scale(0.62)">
    <circle cx="0" cy="-90" r="15"/>
    <rect x="-5" y="-75" width="10" height="10" rx="3"/>
    <path d="M -18,-65 Q -22,-49 -16,-35 Q -14,-21 -14,-9 Q -12,-2 -6,0 L 6,0 Q 12,-2 14,-9 Q 14,-21 16,-35 Q 22,-49 18,-65 Q 10,-74 0,-74 Q -10,-74 -18,-65 Z"/>
    <ellipse cx="-22" cy="-48" rx="6" ry="20" transform="rotate(-18,-22,-48)"/>
    <ellipse cx="22" cy="-48" rx="6" ry="20" transform="rotate(18,22,-48)"/>
  </g>
  <text x="267" y="299" fill="#e2e8f0" font-family="system-ui,Arial,sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Homo habilis</text>
  <text x="267" y="311" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="9.5" text-anchor="middle">~2.5 Ma</text>
  <text x="267" y="322" fill="#475569" font-family="system-ui,Arial,sans-serif" font-size="9" text-anchor="middle">~600 cc</text>

  <!-- === FIGURE 4: Homo erectus ~1.8 Ma — nearly upright, taller === -->
  <g fill="#f59e0b" opacity="0.93" transform="translate(374,282) rotate(5) scale(0.79)">
    <circle cx="0" cy="-90" r="15"/>
    <rect x="-5" y="-75" width="10" height="10" rx="3"/>
    <path d="M -18,-65 Q -23,-48 -17,-34 Q -15,-20 -15,-8 Q -12,-2 -6,0 L 6,0 Q 12,-2 15,-8 Q 15,-20 17,-34 Q 23,-48 18,-65 Q 10,-74 0,-74 Q -10,-74 -18,-65 Z"/>
    <ellipse cx="-23" cy="-46" rx="7" ry="21" transform="rotate(-8,-23,-46)"/>
    <ellipse cx="23" cy="-46" rx="7" ry="21" transform="rotate(8,23,-46)"/>
  </g>
  <text x="374" y="296" fill="#e2e8f0" font-family="system-ui,Arial,sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Homo erectus</text>
  <text x="374" y="308" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="9.5" text-anchor="middle">~1.8 Ma</text>
  <text x="374" y="319" fill="#475569" font-family="system-ui,Arial,sans-serif" font-size="9" text-anchor="middle">~1000 cc</text>

  <!-- === FIGURE 5: Homo neanderthalensis ~400 Ka — upright, stocky === -->
  <g fill="#f59e0b" opacity="0.93" transform="translate(481,280) rotate(2) scale(0.82)">
    <!-- Larger head = larger brain -->
    <circle cx="0" cy="-90" r="17"/>
    <rect x="-6" y="-73" width="12" height="10" rx="3"/>
    <!-- Stocky/wider torso -->
    <path d="M -20,-63 Q -26,-46 -20,-32 Q -17,-18 -17,-7 Q -13,-1 -7,0 L 7,0 Q 13,-1 17,-7 Q 17,-18 20,-32 Q 26,-46 20,-63 Q 11,-72 0,-72 Q -11,-72 -20,-63 Z"/>
    <ellipse cx="-26" cy="-44" rx="8" ry="21" transform="rotate(-5,-26,-44)"/>
    <ellipse cx="26" cy="-44" rx="8" ry="21" transform="rotate(5,26,-44)"/>
  </g>
  <text x="481" y="294" fill="#e2e8f0" font-family="system-ui,Arial,sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Neandertal</text>
  <text x="481" y="306" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="9.5" text-anchor="middle">~400 Ka</text>
  <text x="481" y="317" fill="#475569" font-family="system-ui,Arial,sans-serif" font-size="9" text-anchor="middle">~1600 cc</text>

  <!-- === FIGURE 6: Homo sapiens ~300 Ka - hoy — fully upright, gracile === -->
  <g fill="#f59e0b" opacity="0.93" transform="translate(587,278) rotate(0) scale(0.88)">
    <circle cx="0" cy="-90" r="16"/>
    <rect x="-5" y="-74" width="10" height="10" rx="3"/>
    <path d="M -18,-64 Q -23,-47 -17,-33 Q -15,-19 -15,-8 Q -12,-1 -6,0 L 6,0 Q 12,-1 15,-8 Q 15,-19 17,-33 Q 23,-47 18,-64 Q 10,-73 0,-73 Q -10,-73 -18,-64 Z"/>
    <!-- Arms hanging straight (upright) -->
    <ellipse cx="-23" cy="-44" rx="7" ry="22" transform="rotate(-5,-23,-44)"/>
    <ellipse cx="23" cy="-44" rx="7" ry="22" transform="rotate(5,23,-44)"/>
  </g>
  <text x="587" y="293" fill="#e2e8f0" font-family="system-ui,Arial,sans-serif" font-size="11" text-anchor="middle" font-weight="bold">Homo sapiens</text>
  <text x="587" y="305" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="9.5" text-anchor="middle">~300 Ka – hoy</text>
  <text x="587" y="316" fill="#475569" font-family="system-ui,Arial,sans-serif" font-size="9" text-anchor="middle">~1350 cc</text>

  <!-- Timeline arrow -->
  <line x1="28" y1="370" x2="612" y2="370" stroke="#f59e0b" stroke-width="1.5" opacity="0.3"/>
  <polygon points="607,366 620,370 607,374" fill="#f59e0b" opacity="0.3"/>
  <text x="320" y="390" fill="#475569" font-family="system-ui,Arial,sans-serif" font-size="11" text-anchor="middle">Millones de años atrás ←————————————————→ Actualidad</text>

  <!-- Connecting dots between figures -->
  <circle cx="106" cy="289" r="2.5" fill="#f59e0b" opacity="0.2"/>
  <circle cx="213" cy="287" r="2.5" fill="#f59e0b" opacity="0.2"/>
  <circle cx="320" cy="284" r="2.5" fill="#f59e0b" opacity="0.2"/>
  <circle cx="427" cy="281" r="2.5" fill="#f59e0b" opacity="0.2"/>
  <circle cx="534" cy="279" r="2.5" fill="#f59e0b" opacity="0.2"/>
</svg>
