<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient - deep space dark blue -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </radialGradient>
    <!-- Glow filter for 3D depth -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- Blue circle gradient (3D sphere effect) -->
    <radialGradient id="blueGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="45%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <!-- Red circle gradient -->
    <radialGradient id="redGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="45%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </radialGradient>
    <!-- Green circle gradient -->
    <radialGradient id="greenGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="45%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </radialGradient>
    <!-- Yellow circle gradient -->
    <radialGradient id="yellowGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="45%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <!-- Strand gradient -->
    <linearGradient id="strandL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#64748b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="strandR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#64748b" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#475569" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#64748b" stop-opacity="0.8"/>
    </linearGradient>
    <!-- Rung gradient -->
    <linearGradient id="rungGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#cbd5e1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Background circle for text label -->
    <radialGradient id="labelBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f4c1e"/>
      <stop offset="100%" stop-color="#052010"/>
    </radialGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- Subtle inner border glow -->
  <rect width="512" height="512" rx="110" fill="none" stroke="#22c55e" stroke-width="3" stroke-opacity="0.15"/>

  <!-- Ambient background glow -->
  <ellipse cx="256" cy="200" rx="140" ry="160" fill="#1e40af" fill-opacity="0.08"/>
  <ellipse cx="256" cy="280" rx="100" ry="80" fill="#22c55e" fill-opacity="0.06"/>

  <!-- === DNA DOUBLE HELIX === -->
  <!-- Left backbone strand (sinusoidal path) -->
  <path d="M 185 82 C 165 122 200 165 185 205 C 170 245 200 288 185 328 C 170 368 200 400 185 430"
        stroke="url(#strandL)" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#softGlow)"/>

  <!-- Right backbone strand -->
  <path d="M 327 82 C 347 122 312 165 327 205 C 342 245 312 288 327 328 C 342 368 312 400 327 430"
        stroke="url(#strandR)" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#softGlow)"/>

  <!-- === RUNGS (connecting lines with 3D perspective) === -->
  <!-- Rung 1 (top) -->
  <line x1="185" y1="82" x2="327" y2="82" stroke="url(#rungGrad)" stroke-width="4" stroke-linecap="round"/>
  <!-- Rung 2 -->
  <line x1="193" y1="165" x2="319" y2="165" stroke="url(#rungGrad)" stroke-width="4" stroke-linecap="round"/>
  <!-- Rung 3 (middle) -->
  <line x1="185" y1="248" x2="327" y2="248" stroke="url(#rungGrad)" stroke-width="4" stroke-linecap="round"/>
  <!-- Rung 4 -->
  <line x1="193" y1="331" x2="319" y2="331" stroke="url(#rungGrad)" stroke-width="4" stroke-linecap="round"/>
  <!-- Rung 5 (bottom) -->
  <line x1="185" y1="410" x2="327" y2="410" stroke="url(#rungGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- === BASE PAIR SPHERES (3D effect with radialGradient) === -->
  <!-- Row 1 — Blue / Red -->
  <circle cx="185" cy="82" r="22" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <circle cx="185" cy="82" r="8" fill="white" fill-opacity="0.25" transform="translate(-6,-6)"/>
  <circle cx="327" cy="82" r="22" fill="url(#redGrad)" filter="url(#shadow)"/>
  <circle cx="327" cy="82" r="8" fill="white" fill-opacity="0.25" transform="translate(-6,-6)"/>

  <!-- Row 2 — Green / Yellow -->
  <circle cx="193" cy="165" r="22" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <circle cx="193" cy="165" r="8" fill="white" fill-opacity="0.25" transform="translate(-6,-6)"/>
  <circle cx="319" cy="165" r="22" fill="url(#yellowGrad)" filter="url(#shadow)"/>
  <circle cx="319" cy="165" r="8" fill="white" fill-opacity="0.25" transform="translate(-6,-6)"/>

  <!-- Row 3 (middle) — Red / Blue -->
  <circle cx="185" cy="248" r="22" fill="url(#redGrad)" filter="url(#shadow)"/>
  <circle cx="185" cy="248" r="8" fill="white" fill-opacity="0.25" transform="translate(-6,-6)"/>
  <circle cx="327" cy="248" r="22" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <circle cx="327" cy="248" r="8" fill="white" fill-opacity="0.25" transform="translate(-6,-6)"/>

  <!-- Row 4 — Yellow / Green -->
  <circle cx="193" cy="331" r="22" fill="url(#yellowGrad)" filter="url(#shadow)"/>
  <circle cx="193" cy="331" r="8" fill="white" fill-opacity="0.25" transform="translate(-6,-6)"/>
  <circle cx="319" cy="331" r="22" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <circle cx="319" cy="331" r="8" fill="white" fill-opacity="0.25" transform="translate(-6,-6)"/>

  <!-- Row 5 (bottom) — Blue / Red -->
  <circle cx="185" cy="410" r="22" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <circle cx="185" cy="410" r="8" fill="white" fill-opacity="0.25" transform="translate(-6,-6)"/>
  <circle cx="327" cy="410" r="22" fill="url(#redGrad)" filter="url(#shadow)"/>
  <circle cx="327" cy="410" r="8" fill="white" fill-opacity="0.25" transform="translate(-6,-6)"/>

  <!-- === LABEL === -->
  <!-- Label background pill -->
  <rect x="130" y="448" width="252" height="44" rx="22" fill="url(#labelBg)" opacity="0.85"/>
  <rect x="130" y="448" width="252" height="44" rx="22" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- BioAula3D text -->
  <text x="256" y="477" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800"
        fill="#22c55e" text-anchor="middle" letter-spacing="1">BioAula3D</text>

  <!-- Top sparkle dots for decoration -->
  <circle cx="120" cy="60" r="3" fill="#22c55e" fill-opacity="0.4"/>
  <circle cx="392" cy="45" r="2" fill="#3b82f6" fill-opacity="0.5"/>
  <circle cx="420" cy="90" r="2.5" fill="#f59e0b" fill-opacity="0.4"/>
  <circle cx="95" cy="110" r="2" fill="#ef4444" fill-opacity="0.4"/>
</svg>
